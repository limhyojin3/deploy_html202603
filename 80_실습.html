<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        table {
            border : 1px solid black; /* 2px 크기의 검은색 선(solid)*/
            border-collapse: collapse;  /* 겹치는 선을 하나로 만들어주는 속성이다*/
            /* padding : 5px 20px; 상하 5px 좌우 20px */
            padding-right: 100px;
            
        }
        th {
            text-align: center;  /*가운데 정렬*/
            border : 1px solid black;
            padding : 5px 20px;

        }

        td {
            border : 1px solid black;
            padding-left: 10px;
            padding-right: 200px;
        }
        .center {
            text-align: center;
        }
        .title_contents {
            width: 830px;
            margin: 10px auto;
            padding-top: 3px;
            padding-bottom: 1px;
        }
        .contents {
            width: 800px;
            margin: 10px auto;
            border: 2px solid gray;
            padding-left: 10px;
            padding-top: 10px;
            border-radius: 1%;
        }
        .recruit {
            background-color: rgb(30, 175, 30);
            color:white;
        
        }
        .char{
            font-weight: bold;
            padding-bottom: 10px;
        }
    </style>
</head>
<body>

    <div class="width recruit title_contents" >
        <h2 class="center">자바 수강생 모집</h2>
        <h3 class="center">자바에 관심 있는 새내기 여러분을 모집합니다.</h3>
    </div>

    <div class="contents">
        <div class="char">
            교내 프로그래밍 동아리에서 <span style="color:blue">신입생</span>을 대상으로 자바 수강생을 모집합니다.
            <div style="color:red">학부나 전공에 상관없습니다.</div>
            평소 방송에 관심있었던 여러 학우들의 지원바랍니다.
        </div>

        <table border="1" >
            <tr>
                <th>모집 기간</th>
                <td>2월 5일 ~ 2월 11일</td>
            </tr>

            <tr>
                <th>모집 분야</th>
                <td>자바 기초, 자바 심화, 백엔드 입문</td>
            </tr>

            <tr>
                <th>지원 방법</th>
                <td>
                    양식 작성 후 이메일 접수
                    <div style="font-style: italic;">
                        지원서 양식은 교내 동아리 홈페이지 공지 게시판에 있습니다.
                    </div>
                </td>
            </tr>
        </table>          
                    
        <h4>혜택</h4>
        <ul>
            <li>아주 작은 소정의 활동비 지급</li>
            <li>주기적인 회식</li>
        </ul>

        <div style="text-align: center;">
            <img src="../media/java_img.jpg" style="">
        </div>
        
    </div>
        
</body>
</html>
